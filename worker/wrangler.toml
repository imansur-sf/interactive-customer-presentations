name = "icp-imranai-llm"
main = "worker.js"
compatibility_date = "2026-01-15"

# This Worker only proxies analytics tracking (POST /imranAI/track) and a
# liveness check (GET /health). LLM calls used to be proxied through
# /imranAI/llm, but that path — and the skill-context Text-module bundling it
# relied on — was removed once the app moved to direct browser-to-SF-LLM-Gateway
# calls (BYOK). The Worker no longer holds or uses any LLM provider secrets.
#
#   CORS (optional):
#     ALLOWED_ORIGINS    comma-separated origins; defaults to *

# Uncomment to bind a custom route once ready:
# [[routes]]
# pattern = "icp.imansur.workers.dev/*"

[observability]
enabled = true
