name = "icp-decktools-llm"
main = "worker.js"
compatibility_date = "2026-01-15"

# Bundle skill-context markdown + reference HTML as text modules so we can
# import them directly in worker.js. These become the LLM system prompt.
[[rules]]
type = "Text"
globs = ["**/*.md", "**/*.html"]
fallthrough = true

# Auth secrets — set with `wrangler secret put <NAME>`:
#
#   Primary path (SF LLM Gateway Express, OpenAI-compat /chat/completions):
#     LLM_GATEWAY_URL    base URL (no trailing slash; the Worker appends /chat/completions)
#     LLM_GATEWAY_KEY    the SF-issued API key
#
#   Alternate path (Anthropic direct /v1/messages):
#     ANTHROPIC_API_KEY  used when the gateway pair isn't set
#
#   CORS (optional):
#     ALLOWED_ORIGINS    comma-separated origins; defaults to *

# Uncomment to bind a custom route once ready:
# [[routes]]
# pattern = "icp.imansur.workers.dev/*"

[observability]
enabled = true
